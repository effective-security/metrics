version: "2"
run:
  timeout: 5m
  modules-download-mode: readonly
  go: "1.26"
  goimports:
    local-prefixes: github.com/golangci/golangci-lint

linters:
  enable:
    #- revive
    #- goconst
    #- unparam
    - staticcheck
    - unused
  settings:
    goconst:
      min-len: 3
      min-occurrences: 3
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - goconst
          - gomnd
